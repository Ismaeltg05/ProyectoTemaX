services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.txt
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.txt
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"