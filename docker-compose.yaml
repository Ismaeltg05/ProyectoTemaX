services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.txt
    container_name: proyectotemax-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.txt
      args:
        VITE_API_BASE_URL: "http://backend:8000"
    container_name: proyectotemax-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend